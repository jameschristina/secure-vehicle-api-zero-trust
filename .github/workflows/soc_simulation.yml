name: SOC Simulation

on:
  push:
    branches: [main]

jobs:
  soc_simulation:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------
      # 1. Checkout repository
      # -----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Set up Python environment
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # -----------------------------
      # 3. Install dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install plotly pandas

      # -----------------------------
      # 4. Run SOC Metrics Engine
      # -----------------------------
      - name: Run SOC Metrics Engine
        run: python soc_metrics_engine.py

      # -----------------------------
      # 5. Generate Dashboards
      # -----------------------------
      - name: Generate Dashboards
        run: python soc_dashboard.py

      # -----------------------------
      # 6. Upload Dashboards as Artifacts
      # -----------------------------
      - name: Archive Dashboards
        uses: actions/upload-artifact@v4
        with:
          name: soc_dashboards
          path: |
            dashboard_health.html
            dashboard_events.html
            dashboard_attack_vectors.html

- name: Fail CI on LOW SOC Health
  run: |
    python -c "import json; exit(1) if json.load(open('soc_metrics.json'))['soc_health_score'] < 40 else print('SOC Health OK')"
