name: SOC Simulation Pipeline

on:
  push:
    branches: [ main ]

jobs:
  soc:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      # -----------------------------
      # SOC Simulation Phases
      # -----------------------------
      - name: Run SOC Phases
        run: |
          python phase_16_identity_federation.py
          python phase_17_kubernetes_security.py
          python phase_18_edr_simulation.py
          python phase_19_purple_team.py
          python phase_20_ai_soc_analyst.py

      # -----------------------------
      # Metrics Engine
      # -----------------------------
      - name: Generate SOC Metrics
        run: python soc_metrics_engine.py

      # -----------------------------
      # Tests
      # -----------------------------
      - name: Run Tests
        run: python -m pytest tests -v

      # -----------------------------
      # Security Scans (soft-fail)
      # -----------------------------
      - name: Bandit
        run: bandit -r . || true

      - name: pip-audit
        run: pip-audit || true

      # -----------------------------
      # Upload SOC Metrics Artifact
      # -----------------------------
      - name: Upload SOC Metrics
        uses: actions/upload-artifact@v4
        with:
          name: soc-metrics
          path: soc_metrics.json
