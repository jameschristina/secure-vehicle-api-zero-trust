<!DOCTYPE html>
<html>
<head>
    <title>SOC Command Center</title>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            background: #0b0f14;
            color: #00ff9f;
            font-family: monospace;
        }

        h1 {
            color: #00ff9f;
        }

        #stream {
            height: 80vh;
            overflow-y: auto;
            border: 1px solid #1f2a33;
            padding: 10px;
            background: #0f141a;
        }

        .event {
            padding: 6px;
            margin: 4px 0;
            border-left: 4px solid #00ff9f;
        }

        .CRITICAL { border-left-color: red; color: #ff4d4d; }
        .HIGH { border-left-color: orange; color: orange; }
        .MEDIUM { border-left-color: yellow; color: yellow; }
        .LOW { border-left-color: #00ff9f; color: #00ff9f; }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #1f2a33;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🚗 SOC COMMAND CENTER</h1>
    <div>LIVE STREAMING ANALYTICS</div>
</div>

<div id="stream"></div>

<script>
    const socket = io();

    const stream = document.getElementById("stream");

    socket.on("soc_event", function(event) {

        const div = document.createElement("div");

        div.classList.add("event");
        div.classList.add(event.severity);

        div.innerHTML = `
            [LIVE] ${event.vehicle_id} |
            ${event.event_type} |
            RISK=${event.risk_score} |
            ${event.severity}
        `;

        stream.prepend(div);

        // keep last 100 events only
        if (stream.children.length > 100) {
            stream.removeChild(stream.lastChild);
        }
    });
</script>

</body>
</html>
