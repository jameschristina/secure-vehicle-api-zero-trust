name: SOC Simulation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  soc_simulation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      # =========================
      # Phase A: Tests
      # =========================
      - name: Run SOC tests
        run: python -m pytest tests/ -v

      # =========================
      # Phase B: Security Scans
      # =========================
      - name: Run Bandit security scan
        run: |
          bandit -r . || true  # soft-fail
      - name: Run pip-audit
        run: |
          pip-audit || true  # soft-fail

      # =========================
      # Phase C: SOC Simulation Metrics
      # =========================
      - name: Run SOC metrics generation
        run: |
          python generate_soc_metrics.py
