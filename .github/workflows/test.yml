name: SOC Simulation CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install pytest

    # =========================
    # PHASE A — SOC EXECUTION VALIDATION
    # =========================
    - name: Run SOC Execution Tests
      run: |
        pytest tests/ -v
    # =========================
    # PHASE B — Security Scanning
    # =========================
    - name: Run Bandit Security Scan
      run: |
        pip install bandit
        bandit -r . -lll || true   # soft fail, report only

    - name: Run pip-audit Dependency Scan
      run: |
        pip install pip-audit
        pip-audit --ignore-insecure-hosts || true  # soft fail, report only
