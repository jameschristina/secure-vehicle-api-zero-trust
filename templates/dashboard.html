<!DOCTYPE html>
<html>
<head>
    <title>SOC Dashboard</title>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        body {
            background:#0b0f14;
            color:#00ff99;
            font-family: monospace;
        }

        .critical { color:red; }
        .high { color:orange; }
        .medium { color:yellow; }
    </style>
</head>

<body>

<h2>REAL TIME SOC</h2>

<div id="feed"></div>

<script>
const socket = io();

const eventsDiv = document.getElementById("events");

let riskData = [];

const ctx = document.getElementById('riskChart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Risk Score',
            data: [],
            borderColor: '#00ff99'
        }]
    }
});


socket.on("soc_event", function(event) {

    // LIVE EVENT FEED
    const div = document.createElement("div");

    div.innerHTML =
        `[${event.timestamp}] ` +
        `${event.user} → ${event.event_type} ` +
        `(risk: ${event.risk_score})`;

    div.className =
        event.severity === "CRITICAL" ? "critical" :
        event.severity === "HIGH" ? "high" :
        event.severity === "MEDIUM" ? "medium" : "";

    eventsDiv.prepend(div);


    // CHART UPDATE
    riskData.push(event.risk_score);

    chart.data.labels.push(riskData.length);
    chart.data.datasets[0].data.push(event.risk_score);

    chart.update();

});
</script>

</body>
</html>
