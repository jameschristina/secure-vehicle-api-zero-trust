name: SOC Simulation CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  soc_simulation:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # =========================
    # Run all SOC simulation phases
    # =========================
    - name: Run Phase 16-20 SOC simulation
      run: |
        python phase_16_identity_federation.py
        python phase_17_kubernetes_security.py
        python phase_18_edr_simulation.py
        python phase_19_purple_team.py
        python phase_20_ai_soc_analyst.py

    - name: Generate SOC Metrics
      run: python soc_metrics.py

    - name: Upload SOC Metrics Artifact
      uses: actions/upload-artifact@v4
      with:
        name: soc-metrics
        path: soc_metrics.json
